name: Monthly Prayer Times Update

on:
  schedule:
    # Run on 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Diyanet data
        run: python scripts/fetch_diyanet.py $(date +'%Y')

      - name: Fetch Aladhan data
        run: python scripts/fetch_aladhan.py $(date +'%Y')

      - name: Validate
        run: python scripts/validate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v1/
          git commit -m "Monthly update: $(date +'%Y-%m') prayer times data" || echo "No changes"
          git push
